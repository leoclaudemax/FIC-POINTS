    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  header h1 {
    font-size: 1.1rem;
    color: #38bdf8;
    white-space: nowrap;
  }
  header h1 span { color: #94a3b8; font-weight: 400; font-size: 0.85rem; }
  .mode-tabs {
    display: flex;
    gap: 6px;
  }
  .mode-tab {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid #475569;
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .mode-tab:hover { border-color: #38bdf8; color: #e2e8f0; }
  .mode-tab.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: 600; }
  .stats-bar {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: #94a3b8;
  }
  .stats-bar .val { color: #38bdf8; font-weight: 600; }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 16px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    width: 100%;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .card-question {
    padding: 28px 24px;
    text-align: center;
  }
  .card-question h2 {
    font-size: 1.8rem;
    color: #f1f5f9;
    margin-bottom: 6px;
  }
  .card-question .subtitle {
    color: #64748b;
    font-size: 0.85rem;
  }
  .card-answer {
    display: none;
    flex-direction: column;
  }
  .card-answer.visible { display: flex; }
  #map {
    width: 100%;
    height: 400px;
    border-top: 1px solid #334155;
    border-bottom: 1px solid #334155;
    z-index: 1;
  }
  .coord-bar {
    padding: 10px 20px;
    text-align: center;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85rem;
    color: #94a3b8;

<header>
  <h1>FIC Delta Geo Cards <span>Skyguide ATC</span></h1>

    <button class="mode-tab active" data-mode="srs">Spaced Repetition</button>

  </div>
  <div class="stats-bar">

    <div>Total: <span class="val" id="stat-total">0</span></div>
  </div>
</header>

<main>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <h3>Drill Settings</h3>
    <label>Cards: <input type="number" id="drill-count" value="20" min="5" max="200" step="5"></label>
    <label>Order:

        <option value="random">Random</option>
        <option value="alpha">Alphabetical</option>
        <option value="worst">Worst First</option>
      </select>
    </label>
    <button class="btn-start-drill" id="start-drill">Start Drill</button>
  </div>

  <div class="card" id="card">
    <div class="card-question">
      <h2 id="q-name">Loading...</h2>
      <div class="subtitle" id="q-sub"></div>
    </div>
    <div class="card-answer" id="card-answer">
      <div id="map"></div>
      <div class="coord-bar" id="coord-bar"></div>
    </div>
  </div>

  <div class="actions" id="actions">
    <button class="btn btn-reveal" id="btn-reveal">Reveal Location</button>
  </div>
  <div class="actions" id="rate-actions" style="display:none">
    <button class="btn btn-again" data-rating="1">Again</button>
    <button class="btn btn-hard" data-rating="2">Hard</button>
    <button class="btn btn-good" data-rating="3">Good</button>
    <button class="btn btn-easy" data-rating="4">Easy</button>
  </div>
  <div class="actions" id="drill-actions" style="display:none">
    <button class="btn btn-next" id="btn-drill-next">Next Card</button>
  </div>

  <div class="keyboard-hint" id="kb-hint">Space = Reveal &middot; 1-4 = Rate</div>

  <div class="done-screen" id="done-screen">
    <h2>Session Complete</h2>
    <p id="done-msg"></p>
    <button class="btn btn-restart" id="btn-restart">Restart</button>
  </div>
</main>

// === SRS ENGINE ===
const STORAGE_KEY = "fic_delta_srs_v2";

function loadSRS() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && d.cards) return d;
  } catch(e) {}
  return { cards: {} };
}

function saveSRS(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getCardState(data, name) {
  if (!data.cards[name]) {
    data.cards[name] = { interval: 0, ease: 2.5, due: 0, reps: 0, lapses: 0 };
  }
  return data.cards[name];
}

function rateCard(data, name, rating) {
  const c = getCardState(data, name);
  const now = Date.now();
  if (rating === 1) {
    c.interval = 1;
    c.lapses++;
    c.reps = 0;
  } else {
    if (c.reps === 0) {
      c.interval = rating === 2 ? 1 : rating === 3 ? 3 : 5;
    } else {
      const mult = rating === 2 ? 1.2 : rating === 3 ? c.ease : c.ease * 1.3;
      c.interval = Math.round(Math.max(c.interval * mult, c.interval + 1));
    }
    c.ease = Math.max(1.3, c.ease + (rating === 4 ? 0.15 : rating === 3 ? 0 : -0.15));
    c.reps++;
  }
  c.due = now + c.interval * 86400000;
  saveSRS(data);
}

function getDueCards(data) {
  const now = Date.now();
  const due = [];
  const newCards = [];
  POINTS.forEach(p => {
    const c = data.cards[p.name];
    if (!c || c.reps === 0) newCards.push(p);
    else if (c.due <= now) due.push(p);
  });
  // Review due cards first, then new cards
  return [...shuffle(due), ...shuffle(newCards)];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// === MAP ===
function initMap() {
  if (map) { map.remove(); map = null; }
  map = L.map("map", {
    center: [46.8, 7.1],
    zoom: 8,
    zoomControl: true,
    attributionControl: true
  });
  // Clean topo basemap showing borders, lakes, mountains
  L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://opentopomap.org">OpenTopoMap</a> contributors',
    maxZoom: 17
  }).addTo(map);
}

function showPointOnMap(point) {
  if (!map) initMap();
  if (marker) { map.removeLayer(marker); }
  marker = L.circleMarker([point.lat, point.lon], {
    radius: 9,
    color: "#dc2626",
    fillColor: "#ef4444",
    fillOpacity: 0.9,
    weight: 3
  }).addTo(map);
  map.setView([point.lat, point.lon], 10, { animate: true });
  $coordBar.textContent = `${point.lat.toFixed(4)}\u00b0N  ${point.lon.toFixed(4)}\u00b0E`;
}

// === RENDER ===
function updateStats() {
  const now = Date.now();
  let due = 0, learned = 0;
  POINTS.forEach(p => {
    const c = srsData.cards[p.name];
    if (c && c.reps > 0) {
      learned++;
      if (c.due <= now) due++;
    } else {
      due++;
    }
  });
  $statDue.textContent = due;
  $statLearned.textContent = learned;
  $statTotal.textContent = POINTS.length;
}

function showCard() {
  $doneScreen.classList.remove("visible");
  $card.style.display = "";

  if (currentIdx >= queue.length) {
    showDone();
    return;
  }

  const point = queue[currentIdx];
  revealed = false;
  $qName.textContent = point.name;

  if (mode === "srs") {
    const c = srsData.cards[point.name];
    if (c && c.reps > 0) {
      $qSub.textContent = `Interval: ${c.interval}d \u00b7 Ease: ${c.ease.toFixed(2)}`;
    } else {
      $qSub.textContent = "New card";
    }
  } else {
    $qSub.textContent = `${currentIdx + 1} / ${queue.length}`;
  }

  $answer.classList.remove("visible");
  $actions.style.display = "flex";
  $rateActions.style.display = "none";
  $drillActions.style.display = "none";
  $kbHint.textContent = "Space = Reveal";

  const pct = queue.length > 0 ? (currentIdx / queue.length) * 100 : 0;
  $progress.style.width = pct + "%";

  updateStats();
}

function revealCard() {
  if (revealed) return;
  revealed = true;

  const point = queue[currentIdx];
  $answer.classList.add("visible");
  $actions.style.display = "none";

  // Init map after the container is visible
  setTimeout(() => {
    initMap();
    showPointOnMap(point);
  }, 50);

  if (mode === "srs") {
    $rateActions.style.display = "flex";
    $kbHint.textContent = "1 = Again \u00b7 2 = Hard \u00b7 3 = Good \u00b7 4 = Easy";
  } else {
    $drillActions.style.display = "flex";
    $kbHint.textContent = "Space / Enter = Next";
  }
}

  if (!revealed) return;
  const point = queue[currentIdx];
  rateCard(srsData, point.name, rating);
  currentIdx++;
  showCard();
}

function handleDrillNext() {
  if (!revealed) return;
  currentIdx++;
  showCard();
}

function showDone() {
  $card.style.display = "none";
  $actions.style.display = "none";
  $rateActions.style.display = "none";
  $drillActions.style.display = "none";
  $kbHint.textContent = "";
  $progress.style.width = "100%";

  if (mode === "srs") {
    $doneMsg.textContent = "All due cards reviewed! Come back later for more.";
  } else {
    $doneMsg.textContent = `Drill complete: ${queue.length} cards reviewed.`;
  }
  $doneScreen.classList.add("visible");
  updateStats();
}

// === MODE SWITCHING ===
document.querySelectorAll(".mode-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    mode = tab.dataset.mode;
    startMode();
  });
});

function startMode() {
  currentIdx = 0;
  $doneScreen.classList.remove("visible");

  if (mode === "srs") {
    $drillSettings.classList.remove("visible");
    queue = getDueCards(srsData);
    showCard();
  } else {
    $drillSettings.classList.add("visible");
    $card.style.display = "none";
    $actions.style.display = "none";
    $rateActions.style.display = "none";
    $drillActions.style.display = "none";
  }
}

document.getElementById("start-drill").addEventListener("click", () => {
  const count = parseInt(document.getElementById("drill-count").value) || 20;
  const order = document.getElementById("drill-order").value;

  let pool = [...POINTS];
  if (order === "random") pool = shuffle(pool);
  else if (order === "alpha") pool.sort((a, b) => a.name.localeCompare(b.name));
  else if (order === "worst") {
    pool.sort((a, b) => {
      const ca = srsData.cards[a.name];
      const cb = srsData.cards[b.name];
      const sa = ca ? ca.lapses - ca.reps : 100;
      const sb = cb ? cb.lapses - cb.reps : 100;
      return sb - sa;
    });
  }

  queue = pool.slice(0, Math.min(count, pool.length));
  currentIdx = 0;
  $drillSettings.classList.remove("visible");
  showCard();
});

// === REVEAL & RATING BUTTONS ===
document.getElementById("btn-reveal").addEventListener("click", revealCard);
document.querySelectorAll("#rate-actions .btn").forEach(btn => {
  btn.addEventListener("click", () => handleRate(parseInt(btn.dataset.rating)));
});
document.getElementById("btn-drill-next").addEventListener("click", handleDrillNext);
document.getElementById("btn-restart").addEventListener("click", () => startMode());

// === KEYBOARD ===
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  if (e.code === "Space" || e.code === "Enter") {
    e.preventDefault();
    if (!revealed) revealCard();
    else if (mode === "drill") handleDrillNext();
  }
  if (revealed && mode === "srs" && e.key >= "1" && e.key <= "4") {
    handleRate(parseInt(e.key));
  }
});

// === INIT ===
updateStats();
queue = getDueCards(srsData);
showCard();
</script>
</body>
</html>
